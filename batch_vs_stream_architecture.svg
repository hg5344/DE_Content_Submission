<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Batch vs Stream Architecture</title>
  <desc id="desc">Side by side comparison of batch processing and stream processing architectures.</desc>

  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .box { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; rx: 14; ry: 14; }
      .box2 { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 14; ry: 14; }
      .box3 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 14; ry: 14; }
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 15px Arial, sans-serif; fill: #334155; }
      .caption { font: 500 16px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
      .divider { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"></path>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="700"></rect>

  <text x="600" y="50" text-anchor="middle" class="title">Batch Processing vs Stream Processing</text>
  <text x="600" y="82" text-anchor="middle" class="caption">Same goal: transform data into useful outputs. Different timing models.</text>

  <rect class="panel" x="40" y="120" width="520" height="500"></rect>
  <rect class="panel" x="640" y="120" width="520" height="500"></rect>

  <text x="300" y="165" text-anchor="middle" class="subtitle">Batch Processing</text>
  <text x="900" y="165" text-anchor="middle" class="subtitle">Stream Processing</text>

  <rect class="box" x="95" y="220" width="160" height="70" rx="14" ry="14"></rect>
  <text x="175" y="248" text-anchor="middle" class="label">Raw Data</text>
  <text x="175" y="272" text-anchor="middle" class="small">Files / tables / logs</text>

  <rect class="box2" x="320" y="220" width="160" height="70" rx="14" ry="14"></rect>
  <text x="400" y="248" text-anchor="middle" class="label">Scheduler</text>
  <text x="400" y="272" text-anchor="middle" class="small">Hourly / daily trigger</text>

  <rect class="box3" x="207" y="360" width="190" height="80" rx="14" ry="14"></rect>
  <text x="302" y="392" text-anchor="middle" class="label">Batch Job</text>
  <text x="302" y="417" text-anchor="middle" class="small">Transform, join, aggregate</text>

  <rect class="box" x="185" y="500" width="230" height="70" rx="14" ry="14"></rect>
  <text x="300" y="528" text-anchor="middle" class="label">Warehouse / Report</text>
  <text x="300" y="552" text-anchor="middle" class="small">Stable periodic output</text>

  <path class="arrow" d="M255 255 C278 255, 297 255, 320 255"></path>
  <path class="arrow" d="M400 290 C400 325, 345 330, 315 360"></path>
  <path class="arrow" d="M302 440 C302 462, 302 478, 302 500"></path>

  <text x="300" y="600" text-anchor="middle" class="caption">Waits, then processes a bounded chunk of data</text>

  <rect class="box" x="695" y="220" width="160" height="70" rx="14" ry="14"></rect>
  <text x="775" y="248" text-anchor="middle" class="label">Events</text>
  <text x="775" y="272" text-anchor="middle" class="small">Clicks / payments / logs</text>

  <rect class="box2" x="920" y="220" width="160" height="70" rx="14" ry="14"></rect>
  <text x="1000" y="248" text-anchor="middle" class="label">Message Broker</text>
  <text x="1000" y="272" text-anchor="middle" class="small">Kafka / Kinesis</text>

  <rect class="box3" x="802" y="360" width="190" height="80" rx="14" ry="14"></rect>
  <text x="897" y="392" text-anchor="middle" class="label">Stream Processor</text>
  <text x="897" y="417" text-anchor="middle" class="small">Continuous low-latency logic</text>

  <rect class="box" x="770" y="500" width="255" height="70" rx="14" ry="14"></rect>
  <text x="897" y="528" text-anchor="middle" class="label">Alerts / Dashboard / App</text>
  <text x="897" y="552" text-anchor="middle" class="small">Near real-time output</text>

  <path class="arrow" d="M855 255 C878 255, 897 255, 920 255"></path>
  <path class="arrow" d="M1000 290 C1000 325, 945 332, 915 360"></path>
  <path class="arrow" d="M897 440 C897 462, 897 478, 897 500"></path>

  <text x="900" y="600" text-anchor="middle" class="caption">Processes events continuously as they arrive</text>

  <line class="divider" x1="600" y1="130" x2="600" y2="610"></line>
</svg>